<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Job</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- ═══ MENU PRINCIPAL POLICE ═══ -->
    <div id="policeMenu" class="police-panel hidden">
        <div class="panel-header">
            <div class="header-badge">
                <div class="badge-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 2.18l7 3.12v4.7c0 4.83-3.23 9.36-7 10.58-3.77-1.22-7-5.75-7-10.58V6.3l7-3.12zM12 7l-3 5h2v4h2v-4h2l-3-5z"/></svg>
                </div>
                <div class="header-info">
                    <h1>POLICE NATIONALE</h1>
                    <span id="headerGrade" class="grade-tag">—</span>
                </div>
            </div>
            <div class="header-actions">
                <button id="btnDuty" class="btn-duty off" onclick="toggleDuty()">
                    <span class="duty-dot"></span>
                    <span id="dutyText">HORS SERVICE</span>
                </button>
                <button class="btn-close" onclick="closeMenu()">&times;</button>
            </div>
        </div>

        <div class="panel-tabs">
            <button class="tab active" data-tab="dashboard" onclick="switchTab('dashboard')">Tableau de bord</button>
            <button class="tab" data-tab="actions" onclick="switchTab('actions')">Actions</button>
            <button class="tab" data-tab="officers" onclick="switchTab('officers')">Effectifs</button>
            <button class="tab commander-only" data-tab="grades" onclick="switchTab('grades')">Grades</button>
            <button class="tab commander-only" data-tab="bank" onclick="switchTab('bank')">Compte Entreprise</button>
            <button class="tab" data-tab="radio" onclick="switchTab('radio')">Radio</button>
        </div>

        <div class="panel-content">
            <!-- DASHBOARD -->
            <div id="tab-dashboard" class="tab-content active">
                <div class="stats-grid">
                    <div class="stat-card blue">
                        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
                        <div class="stat-info">
                            <span class="stat-value" id="onlineCount">0</span>
                            <span class="stat-label">En ligne</span>
                        </div>
                    </div>
                    <div class="stat-card green">
                        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div>
                        <div class="stat-info">
                            <span class="stat-value" id="onDutyCount">0</span>
                            <span class="stat-label">En service</span>
                        </div>
                    </div>
                    <div class="stat-card gold">
                        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg></div>
                        <div class="stat-info">
                            <span class="stat-value" id="gradeDisplay">—</span>
                            <span class="stat-label">Votre grade</span>
                        </div>
                    </div>
                </div>
                <div class="quick-actions">
                    <h3>Actions rapides</h3>
                    <div class="action-grid">
                        <button class="action-btn" onclick="requestNearby('frisk')"><span class="action-icon">🔍</span>Fouiller</button>
                        <button class="action-btn" onclick="requestNearby('handcuff')"><span class="action-icon">⛓️</span>Menotter</button>
                        <button class="action-btn" onclick="requestNearby('fine')"><span class="action-icon">📝</span>Amender</button>
                        <button class="action-btn" onclick="requestNearby('escort')"><span class="action-icon">🚶</span>Escorter</button>
                        <button class="action-btn" onclick="requestNearby('jail')"><span class="action-icon">🔒</span>Emprisonner</button>
                        <button class="action-btn" onclick="requestNearby('vehicle')"><span class="action-icon">🚔</span>En vehicule</button>
                        <button class="action-btn" onclick="doImpound()"><span class="action-icon">🅿️</span>Fourriere</button>
                        <button class="action-btn" onclick="doSpikeStrip()"><span class="action-icon">⚠️</span>Herses</button>
                    </div>
                </div>
            </div>

            <!-- ACTIONS (nearby players selection) -->
            <div id="tab-actions" class="tab-content">
                <h3 id="actionTitle">Selectionner un joueur</h3>
                <div id="nearbyList" class="player-list"></div>
                <div id="actionForm" class="action-form hidden"></div>
            </div>

            <!-- OFFICERS -->
            <div id="tab-officers" class="tab-content">
                <h3>Effectifs en ligne</h3>
                <div id="officersList" class="officer-list"></div>
            </div>

            <!-- GRADES (Commander only) -->
            <div id="tab-grades" class="tab-content">
                <h3>Gestion des Grades</h3>
                <div id="gradesList" class="grades-list"></div>
                <div class="add-grade-form">
                    <h4>Ajouter un grade</h4>
                    <div class="form-row">
                        <input type="text" id="newGradeName" placeholder="Nom du grade" class="input-field">
                        <input type="number" id="newGradeLevel" placeholder="Niveau" class="input-field small" min="1" max="99">
                        <input type="number" id="newGradeSalary" placeholder="Salaire" class="input-field small" min="0">
                        <button class="btn-primary" onclick="addGrade()">Ajouter</button>
                    </div>
                </div>
            </div>

            <!-- COMPANY BANK (Commander only) -->
            <div id="tab-bank" class="tab-content">
                <div class="bank-header">
                    <h3>Compte Entreprise Police</h3>
                    <div class="bank-balance">
                        <span class="balance-label">Solde</span>
                        <span class="balance-value" id="companyBalance">$0</span>
                    </div>
                </div>
                <div class="bank-actions">
                    <div class="bank-form">
                        <input type="number" id="bankAmount" placeholder="Montant" class="input-field" min="1">
                        <button class="btn-primary" onclick="companyDeposit()">Deposer</button>
                        <button class="btn-danger" onclick="companyWithdraw()">Retirer</button>
                    </div>
                </div>
                <div class="transactions-list">
                    <h4>Historique</h4>
                    <div id="companyTransactions"></div>
                </div>
            </div>

            <!-- RADIO -->
            <div id="tab-radio" class="tab-content">
                <h3>Radio Police</h3>
                <div id="radioMessages" class="radio-messages"></div>
                <div class="radio-input">
                    <input type="text" id="radioText" placeholder="Message radio..." class="input-field" onkeydown="if(event.key==='Enter')sendRadio()">
                    <button class="btn-primary" onclick="sendRadio()">Envoyer</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══ FOUILLE (FRISK) ═══ -->
    <div id="friskPanel" class="frisk-panel hidden">
        <div class="frisk-header">
            <h2>Fouille — <span id="friskTargetName">Joueur</span></h2>
            <button class="btn-close" onclick="endFrisk()">&times;</button>
        </div>
        <div id="friskInventory" class="frisk-inventory"></div>
    </div>

    <!-- ═══ AMENDES (pour joueur civil) ═══ -->
    <div id="finesPanel" class="fines-panel hidden">
        <div class="fines-header">
            <div class="fines-title">
                <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 9h-2v2H9v-2H7v-2h2V7h2v2h2v2zm-3 6h2v-2h2v2h2v2H8v-2h2zm4-14.5L17.5 6H14V2.5z"/></svg>
                <h2>Mes Amendes</h2>
            </div>
            <button class="btn-close" onclick="closeFines()">&times;</button>
        </div>
        <div id="finesList" class="fines-list"></div>
    </div>

    <!-- ═══ NOTIFICATION AMENDE RECUE ═══ -->
    <div id="fineNotif" class="fine-notification hidden">
        <div class="fine-notif-icon">📋</div>
        <div class="fine-notif-content">
            <span class="fine-notif-title">Nouvelle Amende</span>
            <span id="fineNotifText" class="fine-notif-text">—</span>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
