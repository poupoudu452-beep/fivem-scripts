<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Go Fast Timer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <!-- Timer de mission Go Fast -->
    <div id="timer-hud" class="hidden">
        <div class="timer-container">
            <!-- Icone horloge -->
            <div class="timer-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
            </div>

            <!-- Infos timer -->
            <div class="timer-info">
                <span class="timer-label">Livraison Go Fast</span>
                <div class="timer-row">
                    <span class="timer-time" id="timer-time">15:00</span>
                    <div class="timer-bar-track">
                        <div class="timer-bar-fill" id="timer-bar-fill"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
