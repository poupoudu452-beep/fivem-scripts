<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<title>Vehicle HUD</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    width: 100vw; height: 100vh;
    overflow: hidden;
    pointer-events: none;
    font-family: 'Inter', sans-serif;
  }

  #hud-wrapper {
    position: fixed;
    bottom: 32px;
    right: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  #hud-wrapper.visible { opacity: 1; transform: translateY(0); }

  /* ── SPEEDOMETER ──────────────────────────────────── */
  #speedo-container {
    position: relative;
    width: 200px;
    height: 200px;
  }

  #speedo-svg {
    width: 100%; height: 100%;
  }

  .arc-bg {
    fill: none;
    stroke: rgba(255,255,255,0.08);
    stroke-width: 6;
    stroke-linecap: round;
  }

  .arc-speed {
    fill: none;
    stroke: #fff;
    stroke-width: 6;
    stroke-linecap: round;
    stroke-dasharray: 0 377;
    transition: stroke-dashoffset 0.15s linear, stroke-dasharray 0.15s linear;
  }

  .arc-fuel {
    fill: none;
    stroke: #22d3ee;
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 0 302;
    transition: stroke-dasharray 0.4s ease;
  }

  .arc-fuel-bg {
    fill: none;
    stroke: rgba(255,255,255,0.05);
    stroke-width: 4;
    stroke-linecap: round;
  }

  .arc-fuel.warn { stroke: #f59e0b; }
  .arc-fuel.empty { stroke: #ef4444; }

  .tick-line {
    stroke: rgba(255,255,255,0.25);
    stroke-width: 1.5;
    stroke-linecap: round;
  }
  .tick-line.major {
    stroke: rgba(255,255,255,0.7);
    stroke-width: 2.5;
  }

  .tick-label {
    fill: rgba(255,255,255,0.35);
    font-size: 8px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    text-anchor: middle;
    dominant-baseline: middle;
  }

  /* Center display */
  #speed-display {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    line-height: 1;
  }

  #gear-indicator {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.3);
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,0.7);
    margin-bottom: 4px;
  }

  #speed-number {
    font-size: 54px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -2px;
    line-height: 1;
    text-shadow: 0 2px 20px rgba(255,255,255,0.15);
  }

  #speed-unit {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.4);
    margin-top: 2px;
    text-transform: uppercase;
  }

  /* ── BOTTOM INFO (fuel + engine light + odometer) ── */
  #bottom-info {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 6px 16px;
    background: rgba(0,0,0,0.35);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  /* Fuel display */
  #fuel-display {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #fuel-icon {
    font-size: 12px;
    opacity: 0.6;
  }
  #fuel-icon.warn { opacity: 1; }
  #fuel-icon.empty { opacity: 1; }

  #fuel-number {
    font-size: 13px;
    font-weight: 700;
    color: #22d3ee;
    min-width: 28px;
    text-align: right;
  }
  #fuel-number.warn { color: #f59e0b; }
  #fuel-number.empty { color: #ef4444; }

  #fuel-unit {
    font-size: 9px;
    color: rgba(255,255,255,0.3);
    font-weight: 400;
  }

  /* Separator */
  .info-sep {
    width: 1px;
    height: 16px;
    background: rgba(255,255,255,0.1);
  }

  /* Engine warning light */
  #engine-light {
    position: relative;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  #engine-icon-svg {
    width: 18px;
    height: 18px;
    transition: filter 0.4s;
  }

  #engine-icon-path {
    fill: #22d3ee;
    transition: fill 0.4s;
  }

  #engine-light[data-state="cyan"]     #engine-icon-path { fill: #22d3ee; }
  #engine-light[data-state="green"]    #engine-icon-path { fill: #22c55e; }
  #engine-light[data-state="orange"]   #engine-icon-path { fill: #f97316; }
  #engine-light[data-state="red"]      #engine-icon-path { fill: #ef4444; }
  #engine-light[data-state="critical"] #engine-icon-path { fill: #ef4444; }

  #engine-light[data-state="cyan"]     #engine-icon-svg { filter: drop-shadow(0 0 4px rgba(34,211,238,0.6)); }
  #engine-light[data-state="green"]    #engine-icon-svg { filter: drop-shadow(0 0 4px rgba(34,197,94,0.6)); }
  #engine-light[data-state="orange"]   #engine-icon-svg { filter: drop-shadow(0 0 6px rgba(249,115,22,0.7)); }
  #engine-light[data-state="red"]      #engine-icon-svg { filter: drop-shadow(0 0 8px rgba(239,68,68,0.8)); }
  #engine-light[data-state="critical"] #engine-icon-svg { filter: drop-shadow(0 0 8px rgba(239,68,68,0.8)); }

  /* Odometer */
  #odometer {
    font-size: 10px;
    font-weight: 500;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
  .blink { animation: blink 0.8s ease-in-out infinite; }

  #stall-alert {
    position: fixed; top: 80px; left: 50%;
    transform: translateX(-50%);
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.4);
    color: #ef4444;
    font-size: 12px; font-weight: 600; letter-spacing: 2px;
    padding: 8px 24px; border-radius: 8px;
    opacity: 0; transition: opacity 0.4s;
    pointer-events: none; text-transform: uppercase;
  }
  #stall-alert.show { opacity: 1; animation: blink 0.9s ease-in-out infinite; }
</style>
</head>
<body>

<div id="stall-alert">&#9888; MOTEUR DÉFAILLANT</div>

<div id="hud-wrapper">

  <!-- SPEEDOMETER -->
  <div id="speedo-container">
    <svg id="speedo-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="speedGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.6)"/>
          <stop offset="100%" stop-color="#fff"/>
        </linearGradient>
      </defs>

      <!-- Fuel arc (inner ring) -->
      <circle class="arc-fuel-bg" cx="100" cy="100" r="66"
              transform="rotate(135, 100, 100)"
              stroke-dasharray="302 415"/>
      <circle class="arc-fuel" id="fuelArc" cx="100" cy="100" r="66"
              transform="rotate(135, 100, 100)"/>

      <!-- Speed arc background -->
      <circle class="arc-bg" cx="100" cy="100" r="88"
              transform="rotate(135, 100, 100)"
              stroke-dasharray="377 553"/>

      <!-- Speed arc fill -->
      <circle class="arc-speed" id="arcSpeed" cx="100" cy="100" r="88"
              transform="rotate(135, 100, 100)"/>

      <!-- Ticks -->
      <g id="ticks"></g>
    </svg>

    <div id="speed-display">
      <div id="gear-indicator">1</div>
      <div id="speed-number">0</div>
      <div id="speed-unit">km/h</div>
    </div>
  </div>

  <!-- Bottom bar: fuel + engine light -->
  <div id="bottom-info">
    <div id="fuel-display">
      <span id="fuel-icon">&#9981;</span>
      <span id="fuel-number">100</span>
      <span id="fuel-unit">%</span>
    </div>

    <div class="info-sep"></div>

    <div id="engine-light" data-state="cyan">
      <svg id="engine-icon-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path id="engine-icon-path" d="M7 4v2H4v2H2v6h2v2h2v2h2v-2h2v2h2v-2h2v2h2v-2h3v-2h1v-2h2V8h-2V6h-3V4h-4v2h-2V4H7zm0 4h10v8H7V8z"/>
      </svg>
    </div>

    <div class="info-sep"></div>

    <div id="odometer">000000</div>
  </div>

</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
const MAX_SPEED  = 320;
const ARC_TOTAL  = 377;    // circumference * (270/360) for speed arc (r=88)
const FUEL_TOTAL = 302;    // circumference * (270/360) for fuel arc (r=66)

// ── ELEMENTS ─────────────────────────────────────────────────
const arcSpeedEl  = document.getElementById('arcSpeed');
const speedNumEl  = document.getElementById('speed-number');
const gearEl      = document.getElementById('gear-indicator');
const fuelArcEl   = document.getElementById('fuelArc');
const fuelNumEl   = document.getElementById('fuel-number');
const fuelIconEl  = document.getElementById('fuel-icon');

const engineLight = document.getElementById('engine-light');
const stallAlertEl= document.getElementById('stall-alert');
const hudWrapper  = document.getElementById('hud-wrapper');

let stallAlertTimer = null;
let lastKmh = 0;

// ── BUILD TICKS ──────────────────────────────────────────────
(function buildTicks() {
  const svg = document.getElementById('ticks');
  const CX = 100, CY = 100, R_IN = 78, R_OUT = 85;
  const R_IN_MAJOR = 74;
  const R_LABEL = 68;
  const START_ANGLE = 135;
  const SWEEP = 270;
  const STEPS = 16;

  for (let i = 0; i <= STEPS; i++) {
    const angle = (START_ANGLE + (SWEEP / STEPS) * i) * Math.PI / 180;
    const isMajor = (i % 4 === 0);
    const rIn = isMajor ? R_IN_MAJOR : R_IN;

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', CX + rIn * Math.cos(angle));
    line.setAttribute('y1', CY + rIn * Math.sin(angle));
    line.setAttribute('x2', CX + R_OUT * Math.cos(angle));
    line.setAttribute('y2', CY + R_OUT * Math.sin(angle));
    line.setAttribute('class', 'tick-line' + (isMajor ? ' major' : ''));
    svg.appendChild(line);

    if (isMajor) {
      const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t.setAttribute('x', CX + R_LABEL * Math.cos(angle));
      t.setAttribute('y', CY + R_LABEL * Math.sin(angle));
      t.setAttribute('class', 'tick-label');
      t.textContent = Math.round((i / STEPS) * MAX_SPEED);
      svg.appendChild(t);
    }
  }
})();

// ── UPDATE FUNCTIONS ─────────────────────────────────────────
function updateSpeed(kmh) {
  lastKmh = kmh;
  const ratio = Math.min(kmh, MAX_SPEED) / MAX_SPEED;
  const filled = ARC_TOTAL * ratio;
  arcSpeedEl.style.strokeDasharray = filled + ' ' + (553 - filled);
  speedNumEl.textContent = kmh;

  // Estimate gear from speed
  var gear;
  if (kmh <= 0) gear = 'N';
  else if (kmh <= 30) gear = '1';
  else if (kmh <= 60) gear = '2';
  else if (kmh <= 90) gear = '3';
  else if (kmh <= 130) gear = '4';
  else if (kmh <= 180) gear = '5';
  else if (kmh <= 230) gear = '6';
  else gear = '7';

  gearEl.textContent = gear;
}

function updateFuel(fuel) {
  const c = Math.max(0, Math.min(100, fuel));
  const filled = FUEL_TOTAL * (c / 100);
  fuelArcEl.style.strokeDasharray = filled + ' ' + (415 - filled);
  fuelNumEl.textContent = Math.floor(c);

  if (c <= 15) {
    fuelArcEl.classList.remove('warn');
    fuelArcEl.classList.add('empty');
    fuelNumEl.className = 'empty blink';
    fuelIconEl.className = 'empty blink';
  } else if (c <= 35) {
    fuelArcEl.classList.remove('empty');
    fuelArcEl.classList.add('warn');
    fuelNumEl.className = 'warn';
    fuelIconEl.className = 'warn';
  } else {
    fuelArcEl.classList.remove('warn', 'empty');
    fuelNumEl.className = '';
    fuelIconEl.className = '';
  }
}

function updateEngine(state) {
  engineLight.setAttribute('data-state', state);
  if (state === 'critical' || state === 'red') {
    engineLight.querySelector('#engine-icon-svg').classList.add('blink');
  } else {
    engineLight.querySelector('#engine-icon-svg').classList.remove('blink');
  }
}

function showStallAlert() {
  stallAlertEl.classList.add('show');
  if (stallAlertTimer) clearTimeout(stallAlertTimer);
  stallAlertTimer = setTimeout(() => stallAlertEl.classList.remove('show'), 3500);
}

function toggleHUD(visible) {
  if (visible) {
    hudWrapper.classList.add('visible');
  } else {
    hudWrapper.classList.remove('visible');
    setTimeout(() => {
      updateSpeed(0);
      stallAlertEl.classList.remove('show');
    }, 600);
  }
}

// ── MESSAGES FIVEM ────────────────────────────────────────────
window.addEventListener('message', function(e) {
  const d = e.data;
  if (d.type === 'toggleHUD')    toggleHUD(d.visible);
  if (d.type === 'updateSpeed')  updateSpeed(d.speed);
  if (d.type === 'updateFuel')   updateFuel(d.fuel);

  if (d.type === 'updateEngine') updateEngine(d.state);
  if (d.type === 'engineStall')  showStallAlert();
});
</script>
</body>
</html>
